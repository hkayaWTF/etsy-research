<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Etsy Product Research</title>
<style>
:root {
  --bg:      #0f172a;
  --surf:    #1e293b;
  --surf2:   #263347;
  --border:  #334155;
  --text:    #f1f5f9;
  --text2:   #94a3b8;
  --text3:   #64748b;
  --orange:  #f97316;
  --green:   #22c55e;
  --red:     #ef4444;
  --blue:    #3b82f6;
  --yellow:  #eab308;
  --purple:  #8b5cf6;
  --pink:    #ec4899;
  --r:       12px;
  --rsm:     8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select { font-family: inherit; }

/* ── Header ───────────────────────────────────────────── */
.header {
  background: linear-gradient(to bottom, #1e293b, #0f172a);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.logo {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, #f97316, #fb923c);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: white;
}
.header-text .title { font-size: 16px; font-weight: 700; color: white; line-height: 1.2; }
.header-text .sub   { font-size: 11px; color: var(--text3); }

/* ── Search form ──────────────────────────────────────── */
.search-section { padding: 24px 20px 0; max-width: 780px; margin: 0 auto; }
.search-bar {
  display: flex; gap: 0; border-radius: 12px; overflow: hidden;
  border: 1.5px solid var(--border); background: var(--surf);
  transition: border-color .2s;
}
.search-bar:focus-within { border-color: var(--orange); }
.search-icon { padding: 0 14px; display: flex; align-items: center; font-size: 16px; color: var(--text3); flex-shrink: 0; }
#q {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 15px; padding: 14px 0;
  min-width: 0;
}
#q::placeholder { color: var(--text3); }
.search-btn {
  background: var(--orange); color: white; border: none;
  padding: 0 22px; font-size: 14px; font-weight: 700;
  letter-spacing: .02em; transition: background .15s; flex-shrink: 0;
}
.search-btn:hover { background: #ea6a08; }
.search-btn:active { background: #d45f07; }

/* ── Filters + sort ───────────────────────────────────── */
.controls {
  display: flex; align-items: center; gap: 12px;
  margin-top: 12px; flex-wrap: wrap;
}
.radio-group {
  display: flex; gap: 4px; background: var(--surf);
  border-radius: 999px; padding: 4px; border: 1px solid var(--border);
}
.radio-group label {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600; padding: 5px 12px;
  border-radius: 999px; cursor: pointer; color: var(--text3);
  transition: all .15s; user-select: none;
}
.radio-group label:has(input:checked) {
  background: var(--surf2); color: white;
}
.radio-group input[type=radio] { display: none; }
#sort {
  background: var(--surf); border: 1px solid var(--border);
  color: var(--text); border-radius: 999px; padding: 6px 14px;
  font-size: 12px; font-weight: 600; outline: none;
  cursor: pointer; margin-left: auto;
}
#sort option { background: #1e293b; }

/* ── Summary bar ──────────────────────────────────────── */
.summary {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 20px; margin: 20px 0 4px;
}
.summary-kw {
  font-size: 13px; color: var(--text2); margin-bottom: 12px;
}
.summary-kw strong { color: var(--text); }
.summary-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
.sum-item { text-align: center; }
.sum-val { font-size: 20px; font-weight: 800; line-height: 1; }
.sum-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: .05em; }
.tags-kw { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.tags-kw-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.tag-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.tag-pill {
  font-size: 11px; background: var(--bg); border: 1px solid var(--border);
  color: var(--text2); padding: 2px 9px; border-radius: 999px;
}
.tag-pill span { color: var(--text3); font-size: 10px; }

/* ── Results grid ─────────────────────────────────────── */
.results-wrap { padding: 0 20px 40px; max-width: 1200px; margin: 0 auto; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 14px;
}

/* ── Card ─────────────────────────────────────────────── */
.card {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; display: flex;
  flex-direction: column; transition: border-color .2s, transform .2s;
}
.card:hover { border-color: #475569; transform: translateY(-1px); }
.card-inner { text-decoration: none; color: inherit; }
.card-top {
  display: flex; gap: 12px; padding: 14px 14px 0;
}
.card-img {
  width: 72px; height: 72px; border-radius: var(--rsm);
  object-fit: cover; flex-shrink: 0; background: var(--bg);
}
.card-img-ph {
  width: 72px; height: 72px; border-radius: var(--rsm);
  background: var(--bg); display: flex; align-items: center;
  justify-content: center; font-size: 28px; flex-shrink: 0;
}
.card-head { flex: 1; min-width: 0; }
.card-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 6px;
}
.card-price-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
}
.card-price { font-size: 15px; font-weight: 800; color: white; }
.badge-dig {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 999px; background: #0c2042; color: #60a5fa;
  border: 1px solid #1e40af;
}
.badge-phy {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 999px; background: #431407; color: #fb923c;
  border: 1px solid #7c2d12;
}
.card-rating { font-size: 12px; display: flex; align-items: center; gap: 4px; color: var(--text2); }
.card-rating .stars { color: #f59e0b; font-size: 11px; letter-spacing: 1px; }
.card-rating .no-rev { color: var(--text3); font-style: italic; }

/* ── Metrics ──────────────────────────────────────────── */
.card-metrics { padding: 12px 14px 0; }
.metrics-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 10px;
}
.metric { background: var(--bg); border-radius: var(--rsm); padding: 8px 10px; }
.m-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
.m-val   { font-size: 15px; font-weight: 800; }
.col-orange { color: var(--orange); }
.col-green  { color: var(--green); }
.col-pink   { color: var(--pink); }
.col-blue   { color: var(--blue); }

/* Score bar */
.score-row { margin-bottom: 12px; }
.score-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.score-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.score-num   { font-size: 13px; font-weight: 800; }
.score-track { height: 5px; background: var(--bg); border-radius: 999px; overflow: hidden; }
.score-fill  { height: 100%; border-radius: 999px; transition: width .4s ease; }

/* Trend badge */
.trend-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700; padding: 3px 9px;
  border-radius: 999px; background: var(--bg);
}

/* ── Card footer ──────────────────────────────────────── */
.card-footer {
  margin-top: auto; padding: 10px 14px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border); gap: 8px;
}
.shop-name { font-size: 11px; color: var(--text3); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.view-btn {
  background: var(--orange); color: white; border: none;
  border-radius: 999px; padding: 6px 14px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
  transition: background .15s; text-decoration: none;
  flex-shrink: 0;
}
.view-btn:hover { background: #ea6a08; }

/* ── Skeleton loading ─────────────────────────────────── */
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
.skeleton { pointer-events: none; }
.sk { background: var(--surf2); border-radius: 6px; animation: pulse 1.4s ease-in-out infinite; }
.sk-img   { width: 72px; height: 72px; border-radius: var(--rsm); }
.sk-line  { height: 12px; margin-top: 8px; }
.sk-short { width: 55%; }

/* ── Messages ─────────────────────────────────────────── */
.msg {
  text-align: center; padding: 60px 20px; color: var(--text2);
}
.msg-icon  { font-size: 48px; margin-bottom: 16px; }
.msg-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.msg-body  { font-size: 14px; line-height: 1.7; color: var(--text2); max-width: 420px; margin: 0 auto 20px; }
.retry-btn {
  background: var(--orange); color: white; border: none;
  border-radius: 999px; padding: 10px 24px;
  font-size: 14px; font-weight: 700; transition: background .15s;
}
.retry-btn:hover { background: #ea6a08; }

/* ── Empty state ──────────────────────────────────────── */
.empty {
  text-align: center; padding: 80px 20px; color: var(--text3);
}
.empty-icon  { font-size: 56px; margin-bottom: 16px; opacity: .5; }
.empty-title { font-size: 16px; color: var(--text2); }

/* ── Footer ───────────────────────────────────────────── */
.footer {
  text-align: center; padding: 20px; font-size: 11px;
  color: var(--text3); border-top: 1px solid var(--border);
}

/* ── Mobile ───────────────────────────────────────────── */
@media (max-width: 600px) {
  .search-section { padding: 16px 12px 0; }
  .results-wrap   { padding: 0 12px 32px; }
  .grid { grid-template-columns: 1fr; gap: 10px; }
  .controls { gap: 8px; }
  #sort { margin-left: 0; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .sum-val { font-size: 17px; }
  .metrics-row { gap: 6px; }
}
@media (max-width: 380px) {
  .search-btn { padding: 0 14px; font-size: 13px; }
  #q { font-size: 14px; }
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <div class="logo">E</div>
  <div class="header-text">
    <div class="title">Etsy Product Research</div>
    <div class="sub">Search any niche — see top listings &amp; metrics</div>
  </div>
</header>

<!-- ── Search ─────────────────────────────────────────── -->
<div class="search-section">
  <form id="form">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input id="q" type="search" placeholder="Try: wedding planner, svg bundle, resume template…" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
      <button type="submit" class="search-btn">Search</button>
    </div>
    <div class="controls">
      <div class="radio-group">
        <label><input type="radio" name="ftype" value="all" checked>All</label>
        <label><input type="radio" name="ftype" value="digital">Digital</label>
        <label><input type="radio" name="ftype" value="physical">Physical</label>
      </div>
      <select id="sort">
        <option value="score">↓ Best Opportunity</option>
        <option value="rev">↓ Monthly Revenue</option>
        <option value="sales">↓ Monthly Sales</option>
        <option value="favs">↓ Most Favorites</option>
        <option value="reviews">↓ Most Reviews</option>
        <option value="price_h">↓ Price: High→Low</option>
        <option value="price_l">↑ Price: Low→High</option>
      </select>
    </div>
  </form>
</div>

<!-- ── Results ────────────────────────────────────────── -->
<div class="results-wrap">
  <div id="results">
    <div class="empty">
      <div class="empty-icon">🛍️</div>
      <div class="empty-title">Search a niche above to see top listings</div>
    </div>
  </div>
</div>

<footer class="footer">
  Estimates use industry review-velocity model (~3.3% review rate · 2.5% conv. for digital).
  For research &amp; validation only — not financial data.
</footer>

<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
const REVIEW_RATE = 0.033;
const CONV_DIG    = 0.025;
const CONV_PHY    = 0.018;

const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

// ── State ──────────────────────────────────────────────────────────────────
let allResults  = [];
let lastKeyword = '';

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchEtsy(keyword) {
  const url = `https://www.etsy.com/search?q=${encodeURIComponent(keyword)}&ref=search_bar&explicit=1`;
  for (const makeProxy of PROXIES) {
    try {
      const resp = await Promise.race([
        fetch(makeProxy(url)),
        new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 13000)),
      ]);
      if (resp && resp.ok) {
        const text = await resp.text();
        if (text.length > 3000) return text;
      }
    } catch (_) { /* try next proxy */ }
  }
  return null;
}

// ── Deep-find listing arrays in JSON ───────────────────────────────────────
function deepFindArr(obj, depth) {
  if (depth > 9 || !obj || typeof obj !== 'object') return null;
  if (Array.isArray(obj)) {
    if (obj.length > 1 && obj[0] && (obj[0].listing_id !== undefined || obj[0].listingId !== undefined)) return obj;
    for (const item of obj.slice(0, 4)) {
      const r = deepFindArr(item, depth + 1);
      if (r && r.length > 3) return r;
    }
    return null;
  }
  const priority = ['hits', 'results', 'listings', 'items', 'searchResults', 'initialResults', 'listingSearch', 'data'];
  for (const k of priority) {
    if (obj[k] != null) { const r = deepFindArr(obj[k], depth + 1); if (r && r.length > 1) return r; }
  }
  for (const v of Object.values(obj)) {
    if (v && typeof v === 'object') { const r = deepFindArr(v, depth + 1); if (r && r.length > 3) return r; }
  }
  return null;
}

// ── Parse HTML → raw listing array ────────────────────────────────────────
function parseListings(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  let out = [];

  // ── Strategy 1: __NEXT_DATA__ ─────────────────────────────────────────
  const nd = doc.getElementById('__NEXT_DATA__');
  if (nd) {
    try {
      const json = JSON.parse(nd.textContent);
      const hits = deepFindArr(json, 0);
      if (hits && hits.length > 0) {
        out = hits.map(normalizeNext).filter(l => l.title);
      }
    } catch (_) {}
  }

  // ── Strategy 2: JSON-LD ItemList ──────────────────────────────────────
  if (out.length === 0) {
    for (const s of doc.querySelectorAll('script[type="application/ld+json"]')) {
      try {
        const ld = JSON.parse(s.textContent);
        const root = Array.isArray(ld) ? ld : [ld];
        for (const node of root) {
          if (node['@type'] === 'ItemList' && node.itemListElement) {
            const items = node.itemListElement.map(el => el.item || el).filter(el => el['@type'] === 'Product');
            if (items.length > 2) {
              out = items.map(normalizeLD).filter(l => l.title);
              break;
            }
          }
        }
        if (out.length > 0) break;
      } catch (_) {}
    }
  }

  // ── Strategy 3: regex scan of raw HTML ───────────────────────────────
  if (out.length === 0) {
    try {
      // Try to find inline listing_id + title + price combos
      const re = /"listing_id"\s*:\s*(\d+)[^}]*?"title"\s*:\s*"([^"]+)"[^}]*?"min_price"\s*:\s*([\d.]+)/g;
      let m; const seen = new Set();
      while ((m = re.exec(html)) !== null) {
        const id = m[1];
        if (!seen.has(id)) {
          seen.add(id);
          out.push({ id, title: m[2], price: parseFloat(m[3]), rating: 0, reviews: 0, favorites: 0,
            shopName: '', shopSales: 0, image: '', isDigital: false, creationTs: 0, tags: [],
            url: `https://www.etsy.com/listing/${id}` });
        }
      }
    } catch (_) {}
  }

  return out;
}

// ── Normalize __NEXT_DATA__ listing ───────────────────────────────────────
function normalizeNext(r) {
  const id = r.listing_id || r.listingId || r.id || '';
  const shop = r.shop || r.shopData || {};
  const imgs = r.images || r.listing_images || [];
  const img0 = imgs[0] || r.main_image || {};
  return {
    id: String(id),
    title: r.title || r.listing_title || '',
    price: parseFloat(r.min_price || r.price || r.priceAmount || 0),
    rating: parseFloat(r.average_rating || r.averageRating || r.rating || 0),
    reviews: parseInt(r.num_ratings || r.numRatings || r.review_count || 0),
    favorites: parseInt(r.num_favorers || r.numFavorers || r.favorites_count || 0),
    shopName: shop.shop_name || shop.shopName || r.shop_name || '',
    shopSales: parseInt(shop.transaction_sold_count || shop.transactionSoldCount || 0),
    image: img0.url_570xN || img0.url_fullxfull || img0.url || img0.src || r.image_url || '',
    isDigital: !!(r.is_digital || r.isDigital),
    creationTs: parseInt(r.original_creation_tsz || r.creation_tsz || r.creationTsz || 0),
    tags: (r.tags || r.tag_names || []).map(t => String(t)),
    url: r.url || (id ? `https://www.etsy.com/listing/${id}` : '#'),
  };
}

// ── Normalize JSON-LD Product ──────────────────────────────────────────────
function normalizeLD(item) {
  const offers = item.offers || {};
  const ag     = item.aggregateRating || {};
  const rawUrl = item['@id'] || item.url || '';
  const idM    = rawUrl.match(/\/listing\/(\d+)/);
  const id     = idM ? idM[1] : '';
  const img    = Array.isArray(item.image) ? item.image[0] : (item.image || '');
  const titleL = (item.name || '').toLowerCase();
  const descL  = (item.description || '').toLowerCase();
  const digitalWords = ['digital', 'download', 'printable', 'template', 'spreadsheet', 'pdf', 'svg', 'instant'];
  const isDigital = digitalWords.some(w => titleL.includes(w) || descL.includes(w));
  return {
    id,
    title: item.name || '',
    price: parseFloat(String(offers.price || 0).replace(/[^0-9.]/g, '') || 0),
    rating: parseFloat(ag.ratingValue || 0),
    reviews: parseInt(ag.reviewCount || 0),
    favorites: 0,
    shopName: (item.seller || {}).name || '',
    shopSales: 0,
    image: img,
    isDigital,
    creationTs: 0,
    tags: [],
    url: rawUrl || (id ? `https://www.etsy.com/listing/${id}` : '#'),
  };
}

// ── Calculate metrics ──────────────────────────────────────────────────────
function calcMetrics(l) {
  const { price, reviews, favorites, isDigital, creationTs } = l;
  const nowSec = Date.now() / 1000;
  const ageMonths = creationTs > 0
    ? Math.max(1, (nowSec - creationTs) / (30.44 * 86400))
    : 12;

  const conv        = isDigital ? CONV_DIG : CONV_PHY;
  const estTotal    = Math.round(reviews / REVIEW_RATE);
  const estMonthly  = Math.round(estTotal / ageMonths);
  const estMonRev   = +(estMonthly * price).toFixed(2);
  const estYrRev    = +(estMonRev * 12).toFixed(2);
  const estViews    = estMonthly > 0 ? Math.round(estMonthly / conv) : 0;

  const favRev = reviews > 0 ? +(favorites / reviews).toFixed(1)
               : (favorites > 100 ? 99 : 0);

  let trend, trendColor;
  if      (favRev > 15 || (favorites > 500 && reviews < 20)) { trend = '🔥 Viral';  trendColor = '#ef4444'; }
  else if (favRev > 8)  { trend = '📈 Hot';    trendColor = '#f97316'; }
  else if (favRev > 4)  { trend = '↗️ Rising';  trendColor = '#eab308'; }
  else if (favRev > 1.5){ trend = '➡️ Stable';  trendColor = '#3b82f6'; }
  else                  { trend = '📉 Mature';  trendColor = '#64748b'; }

  // Opportunity score
  let sc = 0;
  if      (estMonthly >= 100) sc += 30;
  else if (estMonthly >= 30)  sc += 22;
  else if (estMonthly >= 10)  sc += 14;
  else if (estMonthly >= 3)   sc += 7;

  if (isDigital) {
    if (price >= 5  && price <= 20) sc += 25;
    else if (price > 20 && price <= 40) sc += 18;
    else if (price > 0) sc += 8;
  } else {
    if (price >= 15 && price <= 60) sc += 25;
    else if (price > 0) sc += 12;
  }

  if      (favorites >= 2000) sc += 20;
  else if (favorites >= 500)  sc += 16;
  else if (favorites >= 100)  sc += 10;
  else if (favorites >= 20)   sc += 5;

  if      (favRev > 8) sc += 15;
  else if (favRev > 4) sc += 10;
  else if (favRev > 2) sc += 5;

  if (ageMonths < 6 && estMonthly >= 5) sc += 10;

  return { ...l, ageMonths: +ageMonths.toFixed(1),
    estTotal, estMonthly, estMonRev, estYrRev, estViews,
    trend, trendColor, favRev, score: Math.min(sc, 100) };
}

// ── Format helpers ─────────────────────────────────────────────────────────
const fN = n => n >= 1e6 ? `${(n/1e6).toFixed(1)}M`
               : n >= 1e3 ? `${(n/1e3).toFixed(1)}k`
               : String(n || 0);
const fR = n => n >= 1e5 ? `$${(n/1000).toFixed(0)}k`
               : n >= 1e4 ? `$${(n/1000).toFixed(1)}k`
               : `$${n.toLocaleString()}`;
const fStars = r => {
  const full = Math.round(r); const empty = 5 - full;
  return '<span style="color:#f59e0b;font-size:12px">' + '★'.repeat(Math.max(0,full)) + '</span>'
       + '<span style="color:#334155;font-size:12px">' + '★'.repeat(Math.max(0,empty)) + '</span>';
};
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Render card ────────────────────────────────────────────────────────────
function renderCard(m) {
  const sc       = m.score;
  const scColor  = sc >= 70 ? '#22c55e' : sc >= 45 ? '#f97316' : '#ef4444';
  const imgHtml  = m.image
    ? `<img class="card-img" src="${esc(m.image)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-img-ph>🛍️</div>'">`
    : `<div class="card-img-ph">🛍️</div>`;

  return `
<div class="card">
  <div class="card-top">
    ${imgHtml}
    <div class="card-head">
      <div class="card-title">${esc(m.title)}</div>
      <div class="card-price-row">
        <span class="card-price">${m.price > 0 ? '$'+m.price.toFixed(2) : '—'}</span>
        ${m.isDigital ? '<span class="badge-dig">Digital</span>' : '<span class="badge-phy">Physical</span>'}
      </div>
      <div class="card-rating">
        ${m.rating > 0
          ? `${fStars(m.rating)} <span style="color:var(--text3);font-size:11px">(${fN(m.reviews)})</span>`
          : `<span class="no-rev">${m.reviews > 0 ? fN(m.reviews)+' reviews' : 'No reviews yet'}</span>`}
      </div>
    </div>
  </div>
  <div class="card-metrics">
    <div class="metrics-row">
      <div class="metric">
        <div class="m-label">❤️ Favorites</div>
        <div class="m-val col-pink">${m.favorites > 0 ? fN(m.favorites) : '—'}</div>
      </div>
      <div class="metric">
        <div class="m-label">📊 Est/Mo Sales</div>
        <div class="m-val col-orange">${m.estMonthly > 0 ? fN(m.estMonthly) : '—'}</div>
      </div>
      <div class="metric">
        <div class="m-label">💵 Est/Mo Rev</div>
        <div class="m-val col-green">${m.estMonRev > 0 ? fR(m.estMonRev) : '—'}</div>
      </div>
      <div class="metric">
        <div class="m-label">📈 Trend</div>
        <div class="m-val" style="color:${m.trendColor};font-size:12px;padding-top:2px">${m.trend}</div>
      </div>
    </div>
    <div class="score-row">
      <div class="score-top">
        <span class="score-label">Opportunity Score</span>
        <span class="score-num" style="color:${scColor}">${sc}/100</span>
      </div>
      <div class="score-track">
        <div class="score-fill" style="width:${sc}%;background:${scColor}"></div>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <span class="shop-name">${m.shopName ? '🏪 '+esc(m.shopName) : ''}</span>
    <a href="${esc(m.url)}" target="_blank" rel="noopener" class="view-btn">View on Etsy →</a>
  </div>
</div>`;
}

// ── Render summary bar ─────────────────────────────────────────────────────
function renderSummary(list, kw) {
  if (!list.length) return '';
  const avg   = sc => Math.round(sc.reduce((a,b) => a+b, 0) / sc.length);
  const avgSc = avg(list.map(l => l.score));
  const avgPr = (list.reduce((a,l) => a+l.price, 0) / list.length).toFixed(2);
  const totRev = list.reduce((a,l) => a+l.estMonRev, 0);
  const dig    = list.filter(l => l.isDigital).length;

  // Top keywords from tags
  const tagMap = {};
  list.forEach(l => l.tags.forEach(t => { const k = t.toLowerCase().trim(); tagMap[k] = (tagMap[k]||0)+1; }));
  const topTags = Object.entries(tagMap).sort((a,b) => b[1]-a[1]).slice(0, 16);

  const tagsHtml = topTags.length
    ? `<div class="tags-kw">
        <div class="tags-kw-label">Top keywords in these listings</div>
        <div class="tag-pills">${topTags.map(([t,c]) =>
          `<div class="tag-pill">${esc(t)} <span>×${c}</span></div>`).join('')}</div>
      </div>` : '';

  const scColor = avgSc >= 70 ? 'var(--green)' : avgSc >= 45 ? 'var(--orange)' : 'var(--red)';

  return `
<div class="summary">
  <div class="summary-kw">Showing <strong>${list.length}</strong> top listings for <strong>"${esc(kw)}"</strong></div>
  <div class="summary-grid">
    <div class="sum-item">
      <div class="sum-val" style="color:${scColor}">${avgSc}/100</div>
      <div class="sum-lbl">Avg Score</div>
    </div>
    <div class="sum-item">
      <div class="sum-val">$${avgPr}</div>
      <div class="sum-lbl">Avg Price</div>
    </div>
    <div class="sum-item">
      <div class="sum-val" style="color:var(--green)">${fR(totRev)}</div>
      <div class="sum-lbl">Combined Mo. Rev</div>
    </div>
    <div class="sum-item">
      <div class="sum-val" style="color:var(--blue)">${dig}/${list.length}</div>
      <div class="sum-lbl">Digital</div>
    </div>
  </div>
  ${tagsHtml}
</div>`;
}

// ── Sort + filter ──────────────────────────────────────────────────────────
function getSortedFiltered() {
  const ftype  = document.querySelector('[name=ftype]:checked').value;
  const sortBy = document.getElementById('sort').value;
  let list = allResults;
  if (ftype === 'digital')  list = list.filter(l =>  l.isDigital);
  if (ftype === 'physical') list = list.filter(l => !l.isDigital);
  return [...list].sort((a, b) => {
    switch (sortBy) {
      case 'rev':     return b.estMonRev   - a.estMonRev;
      case 'sales':   return b.estMonthly  - a.estMonthly;
      case 'favs':    return b.favorites   - a.favorites;
      case 'reviews': return b.reviews     - a.reviews;
      case 'price_h': return b.price       - a.price;
      case 'price_l': return a.price       - b.price;
      default:        return b.score       - a.score;
    }
  });
}

function renderSorted() {
  const list = getSortedFiltered();
  const el   = document.getElementById('results');
  if (!list.length) {
    el.innerHTML = `<div class="msg"><div class="msg-icon">🔍</div><div class="msg-title">No listings match that filter</div></div>`;
    return;
  }
  el.innerHTML = renderSummary(list, lastKeyword) + `<div class="grid">${list.map(renderCard).join('')}</div>`;
}

// ── Skeletons ──────────────────────────────────────────────────────────────
function renderSkeletons(n) {
  const one = `<div class="card skeleton" style="padding:14px">
    <div style="display:flex;gap:12px">
      <div class="sk sk-img"></div>
      <div style="flex:1">
        <div class="sk sk-line" style="width:90%;margin-bottom:8px"></div>
        <div class="sk sk-line sk-short"></div>
      </div>
    </div>
    <div class="sk sk-line" style="margin-top:14px;height:60px;border-radius:8px"></div>
  </div>`;
  return `<div class="grid">${one.repeat(n)}</div>`;
}

// ── Main search ────────────────────────────────────────────────────────────
async function doSearch() {
  const kw = document.getElementById('q').value.trim();
  if (!kw) { document.getElementById('q').focus(); return; }
  lastKeyword = kw;

  document.getElementById('results').innerHTML = renderSkeletons(8);

  const html = await fetchEtsy(kw);

  if (!html) {
    document.getElementById('results').innerHTML = `
      <div class="msg">
        <div class="msg-icon">⚠️</div>
        <div class="msg-title">Couldn't reach Etsy</div>
        <div class="msg-body">All CORS proxies failed or timed out. This can happen due to network conditions. Wait a few seconds and try again.</div>
        <button class="retry-btn" onclick="doSearch()">↺ Retry Search</button>
      </div>`;
    return;
  }

  const raw = parseListings(html);

  if (raw.length === 0) {
    document.getElementById('results').innerHTML = `
      <div class="msg">
        <div class="msg-icon">🤷</div>
        <div class="msg-title">Fetched Etsy but couldn't parse listings</div>
        <div class="msg-body">Etsy may have updated their page structure, or they served a bot-check page. Try a slightly different keyword or retry in a moment.</div>
        <button class="retry-btn" onclick="doSearch()">↺ Retry</button>
      </div>`;
    return;
  }

  allResults = raw.map(calcMetrics);
  renderSorted();
}

// ── Event listeners ────────────────────────────────────────────────────────
document.getElementById('form').addEventListener('submit', e => { e.preventDefault(); doSearch(); });
document.getElementById('sort').addEventListener('change', () => { if (allResults.length) renderSorted(); });
document.querySelectorAll('[name=ftype]').forEach(r => r.addEventListener('change', () => { if (allResults.length) renderSorted(); }));
</script>
</body>
